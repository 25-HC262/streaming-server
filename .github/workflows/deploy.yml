name: Deploy to Google Cloud

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: '${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}'
          service_account: '${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}'

      - name: 'Upload to GCS'
        uses: 'google-github-actions/upload-cloud-storage@v2'
        with:
          path: './'
          destination: 'sign-language-korean/builds/${{ github.sha }}'
          parent: false
          glob: '**/*.{js,json,md}'

      # Docker 로그인 (Artifact Registry 인증)
      - name: Docker Auth
        run: gcloud auth configure-docker asia-northeast3-docker.pkg.dev --quiet

      # Docker 이미지 빌드 및 푸시
      - name: Build and Push Container
        run: |-
          docker build -t "asia-northeast3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/streaming-server/my-image:${{ github.sha }}" .
          docker push "asia-northeast3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/streaming-server/my-image:${{ github.sha }}"

      # Cloud Run에 서비스 배포
      - name: Deploy to Cloud Run
        uses: 'google-github-actions/deploy-cloudrun@v2'
        with:
          service: 'streaming-server' # Cloud Run에 표시될 이름
          image: 'asia-northeast3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/streaming-server/my-image:${{ github.sha }}'
          region: 'asia-northeast3'