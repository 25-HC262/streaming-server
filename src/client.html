<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Streaming Server</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link rel="stylesheet" href="/src/app.css">
</head>
<body>
    <div class="container">
        <h1>🎥 Video Streaming Server</h1>
        
        <div id="status" class="status info">
            Loading video stream...
        </div>
        
        <div class="video-container">
            <video id="video" controls>
                Your browser does not support the video tag.
            </video>
        </div>
        
        <div class="instructions">
            <p><strong>Instructions:</strong></p>
            <p>1. Make sure you've run <code>node src/ffmpeg.js</code> to convert the video</p>
            <p>2. The video should automatically load and play</p>
            <p>3. If you see errors, check the browser console for details</p>
        </div>
    </div>

    <script src="/src/script.js"></script>
</body>
</html>
