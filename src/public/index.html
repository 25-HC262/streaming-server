<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Streaming Server</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link rel="stylesheet" href="./index.css">
</head>
<body>
    <div class="container">
        <h1>🎥 Video Streaming Server</h1>
        
        <div id="status" class="statusInfo">
            Waiting for userId...
        </div>
        
        <div class="video-container">
            <video id="video" controls>
                Your browser does not support the video tag.
            </video>
        </div>
        
        <div class="instructions">
            <p><strong>Instructions:</strong></p>
            <p>1. The video should automatically load and play</p>
            <p>2. If you want to see specific user's video, add /?userId=[userId] at the end of the URL</p>
        </div>
    </div>

    <script src="./client.js" type="module"></script>
</body>
</html>
